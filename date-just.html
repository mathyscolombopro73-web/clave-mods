<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Date Just — CLAVE MODS · Seiko modifiées boîtier Date Just · Toulouse</title>
<meta name="description" content="Collection Date Just · CLAVE MODS. 11 Seiko modifiées en style Date Just — boîtier rond, guichet date cyclope, bracelet jubilé, calibres NH35. De 110 à 150€." />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="CLAVE MODS" />
<meta property="og:locale" content="fr_FR" />
<meta property="og:title" content="Collection Date Just — CLAVE MODS · Seiko modifiées boîtier rond · Toulouse" />
<meta property="og:description" content="11 Seiko modifiées Date Just — boîtier rond, guichet date cyclope, bracelet jubilé, calibre NH35. Assemblées à la main à Toulouse. De 110 à 150€." />
<meta property="og:image" content="https://clavemods.fr/assets/collections/date-just.png" />
<meta property="og:url" content="https://clavemods.fr/date-just.html" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Collection Date Just — CLAVE MODS · Seiko modifiées Toulouse" />
<meta name="twitter:description" content="11 Seiko modifiées Date Just — boîtier rond, bracelet jubilé. Assemblées à la main à Toulouse." />
<meta name="twitter:image" content="https://clavemods.fr/assets/collections/date-just.png" />
<link rel="icon" type="image/png" href="assets/clave-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
/* ── Hero collection ── */
.col-hero {
  position: relative;
  height: 560px;
  overflow: hidden;
  background: var(--bg);
}
.col-hero img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 30%;
  filter: brightness(0.5) saturate(0.85);
}
.col-hero-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center;
  background: linear-gradient(to right,rgba(10,10,18,.88) 0%,rgba(10,10,18,.45) 55%,transparent 100%);
}
.col-hero-text {
  max-width: var(--wrap);
  margin: 0 auto;
  padding: 0 var(--gutter);
  display: flex; flex-direction: column; gap: 22px;
}
.col-hero-text h1 {
  font-family: var(--display);
  font-size: clamp(52px, 7.5vw, 104px);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 0.9;
  color: var(--fg);
}
.col-hero-text h1 em {
  display: block;
  font-style: italic;
  font-weight: 500;
  color: var(--violet-2);
  font-size: 0.52em;
  margin-top: 10px;
  letter-spacing: -0.01em;
}
.col-hero-text p { font-size: 16px; color: var(--fg-2); max-width: 400px; line-height: 1.6; }
.col-hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }


/* ── Product grid override ── */
.coll-grid .prod-img { aspect-ratio: 4 / 5; }
.coll-grid .prod-img img { width: 100%; height: 100%; object-fit: cover; }


/* ── Info strip ── */
.info-strip {
  display: grid; grid-template-columns: repeat(3, 1fr);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--radius);
  background: var(--surface);
  overflow: hidden;
  margin-top: 70px;
}
.info-cell {
  padding: 32px 28px;
  border-right: 1px solid var(--hairline);
  display: flex; flex-direction: column; gap: 10px;
}
.info-cell:last-child { border-right: 0; }
.info-cell .ic-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--violet-2); }
.info-cell .ic-val { font-family: var(--display); font-size: 20px; font-weight: 700; color: var(--fg); letter-spacing: -0.01em; }
.info-cell p { font-size: 13.5px; color: var(--fg-2); line-height: 1.6; }

/* ── CTA block ── */
.cta-block {
  background: linear-gradient(135deg, var(--violet-deep) 0%, var(--surface-2) 100%);
  border: 1px solid var(--hairline-violet);
  border-radius: var(--radius-lg);
  padding: 60px 56px;
  display: flex; justify-content: space-between; align-items: center; gap: 40px;
  flex-wrap: wrap;
}
.cta-block h3 {
  font-family: var(--display);
  font-size: clamp(28px, 3.5vw, 44px);
  font-weight: 700; letter-spacing: -0.02em;
  color: var(--fg); line-height: 1.1;
}
.cta-block p { color: var(--fg-2); font-size: 15px; line-height: 1.65; max-width: 440px; }
.cta-block-actions { display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }

@media (max-width: 820px) {
  .col-hero { height: 400px; }
  .coll-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .info-strip { grid-template-columns: 1fr; }
  .info-cell { border-right: 0; border-bottom: 1px solid var(--hairline); }
  .info-cell:last-child { border-bottom: 0; }
  .cta-block { padding: 40px 28px; flex-direction: column; }
}
@media (max-width: 540px) {
  .coll-grid { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  .col-hero { height: 300px; }
  .col-hero-text h1 { font-size: clamp(34px, 10vw, 46px); }
  .cta-block { padding: 28px 20px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ── Icônes ── */
const IArrow = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
const ISearch = (p) => <svg {...p} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;
const IInsta = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>;
const ITt    = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M14 4v9a4 4 0 1 1-4-4"/><path d="M14 4c0 2.5 2 4.5 5 4.5"/></svg>;
const IVinted = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1" fill="currentColor" stroke="none"/></svg>;
const IMenu  = (p) => <svg {...p} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M3 12h18M3 6h18M3 18h18"/></svg>;
const IClose = (p) => <svg {...p} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M18 6L6 18M6 6l12 12"/></svg>;

const PRODUCTS = window.CLAVE_DATA.products.filter(p => p.collection === "Date Just");

/* ── Nav ── */
const Nav = () => {
  const [scrolled, setScrolled] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [query, setQuery] = useState("");
  const inputRef = useRef(null);
  useEffect(() => {
    const f = () => setScrolled(window.scrollY > 4);
    window.addEventListener("scroll", f, { passive: true }); f();
    return () => window.removeEventListener("scroll", f);
  }, []);
  useEffect(() => {
    if (!searchOpen) return;
    const onKey  = (e) => { if (e.key === "Escape") { setSearchOpen(false); setQuery(""); } };
    const onDown = (e) => { if (!e.target.closest(".nav")) { setSearchOpen(false); setQuery(""); } };
    document.addEventListener("keydown", onKey);
    document.addEventListener("mousedown", onDown);
    return () => { document.removeEventListener("keydown", onKey); document.removeEventListener("mousedown", onDown); };
  }, [searchOpen]);
  useEffect(() => { if (searchOpen && inputRef.current) inputRef.current.focus(); }, [searchOpen]);
  const submit = () => {
    if (!query.trim()) return;
    window.location.href = `catalogue.html?q=${encodeURIComponent(query.trim())}`;
  };
  return (
    <nav className="nav" style={{ borderBottomColor: scrolled ? "var(--hairline-strong)" : "var(--hairline)" }}>
      <div className="nav-inner">
        <a className="nav-logo" href="index.html">
          <img src="assets/clave-logo.png" alt="" />
          <span><span className="mark">CLAVE</span> <span className="mods">MODS</span></span>
        </a>
        {searchOpen ? (
          <div className="nav-search">
            <input ref={inputRef} type="text" className="nav-search-input" value={query}
              onChange={(e) => setQuery(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && submit()}
              placeholder="Rechercher une montre…" />
            <button className="nav-search-submit" onClick={submit} aria-label="Rechercher"><IArrow /></button>
          </div>
        ) : (
          <div className="nav-links">
            <a href="index.html">Accueil</a>
            <a className="active" href="index.html#collections">Collections</a>
            <a href="index.html#histoire">Notre Histoire</a>
            <a href="index.html#contact">Contact</a>
          </div>
        )}
        <div className="nav-utils">
          <button className="ic-btn" aria-label={searchOpen ? "Fermer" : "Recherche"} onClick={() => { setSearchOpen(s => !s); if (searchOpen) setQuery(""); }}><ISearch /></button>
          <button className="ic-btn ham-btn" aria-label={menuOpen ? "Fermer le menu" : "Menu"} onClick={() => setMenuOpen(o => !o)}>{menuOpen ? <IClose /> : <IMenu />}</button>
        </div>
      </div>
      {menuOpen && (
        <div className="nav-mobile">
          <a href="index.html">Accueil</a>
          <a className="active" href="index.html#collections">Collections</a>
          <a href="index.html#histoire">Notre Histoire</a>
          <a href="index.html#contact">Contact</a>
        </div>
      )}
    </nav>
  );
};

/* ── Badge ── */
const Badge = ({ label }) => {
  if (!label) return null;
  if (label === "Best Seller") return <span className="badge-bs">{label}</span>;
  if (label === "Limitée") return <span className="badge-limitee">★ {label}</span>;
  if (label === "Nouveau") return <span className="badge-new">{label}</span>;
  return null;
};

/* ── Carte produit ── */
const ProductCard = ({ p }) => {
  const isLow = p.stock !== "En stock";
  return (
    <article className="prod-card" style={{ cursor:"pointer" }} onClick={() => window.location.href = `product.html?ref=${p.ref}`}>
      <div className="prod-img" style={{ aspectRatio: "4/5" }}>
        <img src={p.photo} alt={`${p.name} · ${p.collection} · Seiko modifiée CLAVE MODS`} loading="lazy"
             style={{ objectPosition: p.objPos }} />
        {p.badge && (
          <div className="ribbon"><Badge label={p.badge} /></div>
        )}
        <span className="ref">{p.ref}</span>
      </div>
      <div className="prod-body">
        <div className="prod-name-row">
          <div>
            <div className="prod-name">{p.name}</div>
            <div className="prod-style">Date Just · Seiko mod</div>
          </div>
          <span className={`prod-stock ${isLow ? "low" : ""}`}>{p.stock}</span>
        </div>
        <p className="prod-desc">{p.desc}</p>
        <div className="prod-price-row">
          <div className="prod-price"><span className="vlt">{p.price}€</span></div>
          <button className="prod-btn" onClick={(e) => { e.stopPropagation(); window.location.href = `product.html?ref=${p.ref}`; }}>Commander</button>
        </div>
      </div>
    </article>
  );
};

/* ── Footer ── */
const Footer = () => (
  <footer>
    <div className="footer-inner">
      <div className="footer-brand">
        <div className="logo">
          <img src="assets/clave-logo.png" alt="" />
          <span><span>CLAVE</span> <span className="mods">MODS</span></span>
        </div>
        <p>Maison française de Seiko modifiées artisanalement. Chaque pièce est assemblée, réglée et contrôlée à la main — l'atelier CLAVE, à Toulouse.</p>
      </div>
      <div className="footer-col"><h5>Collections</h5><ul>
        <li><a href="royal-oak.html">Royal Oak</a></li>
        <li><a href="nautilus.html">Nautilus</a></li>
        <li><a href="date-just.html" style={{ color:"var(--violet-2)" }}>Date Just</a></li>
        <li><a href="catalogue.html">Voir le catalogue</a></li>
      </ul></div>
      <div className="footer-col"><h5>Atelier</h5><ul>
        <li><a href="index.html#histoire">Notre histoire</a></li>
      </ul>
      <h5 style={{ marginTop:"22px" }}>Légal</h5>
      <ul>
        <li><a href="mentions-legales.html">Mentions légales</a></li>
        <li><a href="cgv.html">CGV</a></li>
        <li><a href="confidentialite.html">Confidentialité</a></li>
      </ul></div>
      <div className="footer-col"><h5>Support</h5><ul>
        <li><a href="index.html#contact">Nous écrire</a></li>
      </ul>
      <h5 style={{ marginTop:"22px" }}>Retrouvez-moi</h5>
      <ul className="footer-social-links">
        <li><a href="https://www.instagram.com/clave_mods/" target="_blank" rel="noopener noreferrer"><span className="soc-icon"><IInsta /></span>Instagram</a></li>
        <li><a href="https://www.tiktok.com/@clavemods" target="_blank" rel="noopener noreferrer"><span className="soc-icon"><ITt /></span>TikTok</a></li>
        <li><a href="https://www.vinted.fr/member/3155836117" target="_blank" rel="noopener noreferrer"><span className="soc-icon"><IVinted /></span>Vinted</a></li>
      </ul></div>
      
    </div>
    <div className="footer-bottom">
      <span>© CLAVE MODS · 2017 — 2026 · Toulouse</span>
      <div className="footer-legal">
        <a href="mentions-legales.html">Mentions légales</a>
        <a href="cgv.html">CGV</a>
        <a href="confidentialite.html">Confidentialité</a>
      </div>
      <div className="footer-social">
        <a href="https://www.instagram.com/clave_mods/" aria-label="Instagram" target="_blank" rel="noopener noreferrer"><IInsta /></a>
        <a href="https://www.tiktok.com/@clavemods" aria-label="TikTok" target="_blank" rel="noopener noreferrer"><ITt /></a>
        <a href="https://www.vinted.fr/member/3155836117" aria-label="Vinted" target="_blank" rel="noopener noreferrer"><IVinted /></a>
      </div>
    </div>
  </footer>
);

/* ── Page ── */
function Page() {
  return (
    <>
      {/* Bandeau */}
      <div className="ship-banner">
        <span><span className="dot" /> Livraison mondiale offerte dès 150€</span>
        <span className="sep ship-extra">✦</span>
        <span className="ship-extra">Pièces numérotées, assemblées à Toulouse</span>
        <span className="sep ship-extra">✦</span>
        <span className="ship-extra">Garantie 3 ans atelier</span>
      </div>

      <Nav />

      <main>
      {/* Hero */}
      <div className="col-hero">
        <img src="input/date Just/arabic royal blue.png" alt="Collection Date Just — Seiko modifiée CLAVE MODS, atelier Toulouse" />
        <div className="col-hero-overlay">
          <div className="col-hero-text">
            <div className="eyebrow">Collection · Date Just</div>
            <h1>
              Date Just
              <em>Boîtier rond · élégance classique.</em>
            </h1>
            <p>{PRODUCTS.length} pièces assemblées à la main. L'élégance intemporelle du grand classique — réinterprétée dans un atelier toulousain, calibre Seiko automatique à l'intérieur.</p>
            <div className="col-hero-actions">
              <a className="cta" href="#catalogue">
                Voir les {PRODUCTS.length} pièces <IArrow className="arrow" />
              </a>
              <a className="cta-ghost" href="index.html">
                ← Retour accueil
              </a>
            </div>
          </div>
        </div>
      </div>

      {/* Fil d'Ariane */}
      <nav className="breadcrumb" aria-label="Fil d'Ariane">
        <a href="index.html">Accueil</a>
        <span className="sep">›</span>
        <a href="index.html#collections">Collections</a>
        <span className="sep">›</span>
        <span style={{ color:"var(--fg-2)" }}>Date Just</span>
      </nav>

      {/* Catalogue */}
      <section className="wrap" id="catalogue" style={{ paddingTop: 56 }}>
        <div className="sec-head">
          <div className="left">
            <div className="eyebrow">{PRODUCTS.length} références · Date Just</div>
            <h2 className="h-section">
              La collection<br />
              <span className="it">complète.</span>
            </h2>
          </div>
          <div className="meta">
            <span className="label" style={{ color:"var(--violet-2)" }}>BOÎTIER ROND · Ø 39 MM</span>
            <span className="label">CALIBRE NH35 · AUTOMATIQUE · DATE</span>
          </div>
        </div>

        <div className="prod-grid coll-grid">
          {PRODUCTS.map((p) => <ProductCard key={p.ref} p={p} />)}
        </div>

        {/* Fiche technique */}
        <div className="info-strip">
          <div className="info-cell">
            <span className="ic-lbl">Boîtier</span>
            <span className="ic-val">Acier 316L · Jubilé</span>
            <p>Acier inoxydable 316L brossé et poli. Boîtier rond Ø 39 mm avec guichet date à 3h magnifié par un verre cyclope. Bracelet jubilé 5 rangs ou oyster au choix.</p>
          </div>
          <div className="info-cell">
            <span className="ic-lbl">Mouvement</span>
            <span className="ic-val">NH35 · Date</span>
            <p>Calibre Seiko NH35 automatique importé du Japon. Complication date intégrée, 41h de réserve de marche, 21 rubis. Le pilier de fiabilité de l'atelier CLAVE.</p>
          </div>
          <div className="info-cell">
            <span className="ic-lbl">Finition atelier</span>
            <span className="ic-val">Toulouse · Main</span>
            <p>Chaque montre est assemblée, réglée et contrôlée à la main par une seule personne. Contrôle d'amplitude et de précision avant tout départ.</p>
          </div>
        </div>
      </section>

      {/* CTA sur mesure */}
      <section className="wrap" style={{ paddingTop: 80, paddingBottom: 30 }}>
        <div className="cta-block">
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div className="eyebrow">Configuration sur mesure</div>
            <h3>Un Date Just<br />à votre image.</h3>
            <p>Cadran hors catalogue, gravure, aiguilles sur commande — toutes les références Date Just sont ouvertes à la configuration complète. Je prends le temps de vous répondre.</p>
          </div>
          <div className="cta-block-actions">
            <a className="cta" href="mailto:clavemods@gmail.com">
              Configurer ma montre <IArrow className="arrow" />
            </a>
            <a className="cta-ghost" href="index.html#contact">
              Lire la FAQ
            </a>
          </div>
        </div>
      </section>
      </main>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
