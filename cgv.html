<style>

}

.legal-body h2 {

}

.legal-body h3 {

  text-transform: uppercase;

}

  color: var(--fg-2);

.legal-body ul li::before {
  content: "–";

.legal-body strong { color: var(--fg); font-weight: 600; }

.lp {

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const IArrow  = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
const ISearch = (p) => <svg {...p} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;
const IInsta  = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>;
const ITt     = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M14 4v9a4 4 0 1 1-4-4"/><path d="M14 4c0 2.5 2 4.5 5 4.5"/></svg>;
const IVinted = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1" fill="currentColor" stroke="none"/></svg>;
const IMenu   = (p) => <svg {...p} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M3 12h18M3 6h18M3 18h18"/></svg>;
const IClose  = (p) => <svg {...p} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M18 6L6 18M6 6l12 12"/></svg>;

const Nav = () => {
  const [scrolled, setScrolled] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [query, setQuery] = useState("");
  const inputRef = useRef(null);
  useEffect(() => {
    const f = () => setScrolled(window.scrollY > 4);
    window.addEventListener("scroll", f, { passive: true }); f();
    return () => window.removeEventListener("scroll", f);
  }, []);
  useEffect(() => {
    if (!searchOpen) return;
    const onKey  = (e) => { if (e.key === "Escape") { setSearchOpen(false); setQuery(""); } };
    const onDown = (e) => { if (!e.target.closest(".nav")) { setSearchOpen(false); setQuery(""); } };
    document.addEventListener("keydown", onKey);
    document.addEventListener("mousedown", onDown);
    return () => { document.removeEventListener("keydown", onKey); document.removeEventListener("mousedown", onDown); };
  }, [searchOpen]);
  useEffect(() => { if (searchOpen && inputRef.current) inputRef.current.focus(); }, [searchOpen]);
  const submit = () => {
    if (!query.trim()) return;
    window.location.href = `catalogue.html?q=${encodeURIComponent(query.trim())}`;
  };
  return (
    <nav className="nav" style={{ borderBottomColor: scrolled ? "var(--hairline-strong)" : "var(--hairline)" }}>
      <div className="nav-inner">
        <a className="nav-logo" href="index.html">
          <img src="assets/clave-logo.png" alt="" />
          <span><span className="mark">CLAVE</span> <span className="mods">MODS</span></span>
        </a>
        {searchOpen ? (
          <div className="nav-search">
            <input ref={inputRef} type="text" className="nav-search-input" value={query}
              onChange={(e) => setQuery(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && submit()}
              placeholder="Rechercher une montre…" />
            <button className="nav-search-submit" onClick={submit} aria-label="Rechercher"><IArrow /></button>
          </div>
        ) : (
          <div className="nav-links">
            <a href="index.html">Accueil</a>
            <a href="index.html#collections">Collections</a>
            <a href="index.html#histoire">Notre Histoire</a>
            <a href="index.html#contact">Contact</a>
          </div>
        )}
        <div className="nav-utils">
          <button className="ic-btn" aria-label={searchOpen ? "Fermer" : "Recherche"} onClick={() => { setSearchOpen(s => !s); if (searchOpen) setQuery(""); }}><ISearch /></button>
          <button className="ic-btn ham-btn" aria-label={menuOpen ? "Fermer le menu" : "Menu"} onClick={() => setMenuOpen(o => !o)}>{menuOpen ? <IClose /> : <IMenu />}</button>
        </div>
      </div>
      {menuOpen && (
        <div className="nav-mobile">
          <a href="index.html">Accueil</a>
          <a href="index.html#collections">Collections</a>
          <a href="index.html#histoire">Notre Histoire</a>
          <a href="index.html#contact">Contact</a>
        </div>
      )}
    </nav>
  );
};

const Footer = () => (
  <footer>
    <div className="footer-inner">
      <div className="footer-brand">
        <div className="logo">
          <img src="assets/clave-logo.png" alt="" />
          <span><span>CLAVE</span> <span className="mods">MODS</span></span>
        </div>
        <p>Maison française de Seiko modifiées artisanalement. Chaque pièce est assemblée, réglée et contrôlée à la main — l'atelier CLAVE, à Toulouse.</p>
      </div>
      <div className="footer-col"><h5>Collections</h5><ul>
        <li><a href="royal-oak.html">Royal Oak</a></li>
        <li><a href="nautilus.html">Nautilus</a></li>
        <li><a href="date-just.html">Date Just</a></li>
        <li><a href="catalogue.html">Voir le catalogue</a></li>
      </ul></div>
      <div className="footer-col"><h5>Atelier</h5><ul>
        <li><a href="index.html#histoire">Notre histoire</a></li>
      </ul>
      <h5 style={{ marginTop:"22px" }}>Légal</h5>
      <ul>
        <li><a href="mentions-legales.html">Mentions légales</a></li>
        <li><a href="cgv.html" style={{ color:"var(--violet-2)" }}>CGV</a></li>
        <li><a href="confidentialite.html">Confidentialité</a></li>
      </ul></div>
      <div className="footer-col"><h5>Support</h5><ul>
        <li><a href="index.html#contact">Nous écrire</a></li>
      </ul>
      <h5 style={{ marginTop:"22px" }}>Retrouvez-moi</h5>
      <ul className="footer-social-links">
        <li><a href="https://www.instagram.com/clave_mods/" target="_blank" rel="noopener noreferrer"><span className="soc-icon"><IInsta /></span>Instagram</a></li>
        <li><a href="https://www.tiktok.com/@clavemods" target="_blank" rel="noopener noreferrer"><span className="soc-icon"><ITt /></span>TikTok</a></li>
        <li><a href="https://www.vinted.fr/member/3155836117" target="_blank" rel="noopener noreferrer"><span className="soc-icon"><IVinted /></span>Vinted</a></li>
      </ul></div>
    </div>
    <div className="footer-bottom">
      <span>© CLAVE MODS · 2017 — 2026 · Toulouse</span>
      <div className="footer-legal">
        <a href="mentions-legales.html">Mentions légales</a>
        <a href="cgv.html">CGV</a>
        <a href="confidentialite.html">Confidentialité</a>
      </div>
      <div className="footer-social">
        <a href="https://www.instagram.com/clave_mods/" aria-label="Instagram" target="_blank" rel="noopener noreferrer"><IInsta /></a>
        <a href="https://www.tiktok.com/@clavemods" aria-label="TikTok" target="_blank" rel="noopener noreferrer"><ITt /></a>
        <a href="https://www.vinted.fr/member/3155836117" aria-label="Vinted" target="_blank" rel="noopener noreferrer"><IVinted /></a>
      </div>
    </div>
  </footer>
);

function Page() {
  return (
    <>
      <div className="ship-banner">
        <span><span className="dot" /> Livraison mondiale offerte dès 150€</span>
        <span className="sep ship-extra">✦</span>
        <span className="ship-extra">Pièces numérotées, assemblées à Toulouse</span>
        <span className="sep ship-extra">✦</span>
        <span className="ship-extra">Garantie 3 ans atelier</span>
      </div>
      <Nav />
      <main>
        <div className="legal-hero wrap">
          <nav className="breadcrumb" aria-label="Fil d'Ariane">
            <a href="index.html">Accueil</a>
            <span className="sep">›</span>
            <span style={{ color:"var(--fg-2)" }}>Conditions générales de vente</span>
          </nav>
          <div className="eyebrow" style={{ marginTop:32 }}>Conditions de vente</div>
          <h1>CGV<br /><span className="it">ce qu'il faut savoir.</span></h1>
          <p className="legal-date">Dernière mise à jour : mai 2026</p>
        </div>
        <div className="legal-divider" />

        <div className="legal-body wrap">

          <h2>1. Objet</h2>
          <p>Les présentes conditions générales de vente (CGV) régissent les relations contractuelles entre <strong>CLAVE MODS</strong> (Mathys Colombo, entrepreneur individuel, Toulouse, France) et tout acheteur non professionnel (consommateur) passant commande via le site clavemods.fr ou par tout autre canal de vente en ligne (email, réseaux sociaux).</p>
          <p>Toute commande implique l'acceptation sans réserve des présentes CGV.</p>

          <h2>2. Produits</h2>
          <p>CLAVE MODS propose des montres Seiko modifiées artisanalement en deux catégories :</p>
          <ul>
            <li><strong>Pièces en stock</strong> — disponibles immédiatement, expédiées sous 48h ouvrées après réception du paiement complet.</li>
            <li><strong>Pièces sur-mesure / configuration personnalisée</strong> — fabriquées après commande et confirmation de l'acompte. Le délai de fabrication est communiqué individuellement à la commande (généralement 7 à 21 jours ouvrés).</li>
          </ul>
          <p>Chaque montre est unique, assemblée à la main à l'atelier CLAVE, Toulouse. Les photographies sont représentatives mais peuvent présenter de légères variations de teinte selon les conditions de prise de vue.</p>

          <h2>3. Prix</h2>
          <p>Les prix sont indiqués en euros (€). CLAVE MODS est un entrepreneur individuel non soumis à la TVA en application de l'article 293 B du Code général des impôts — les prix affichés sont les prix finaux.</p>
          <p>CLAVE MODS se réserve le droit de modifier ses prix à tout moment. Les commandes sont facturées au prix en vigueur au moment de la confirmation.</p>

          <h2>4. Commande</h2>
          <p>La commande est réputée confirmée après :</p>
          <ul>
            <li>Réception du paiement intégral pour les pièces en stock.</li>
            <li>Réception de l'acompte pour les pièces sur-mesure.</li>
          </ul>
          <p>Un email de confirmation est adressé à l'acheteur à l'adresse fournie lors de la commande.</p>

          <h2>5. Paiement</h2>
          <p><strong>Pièces en stock :</strong> paiement intégral à la commande.</p>
          <p><strong>Pièces sur-mesure :</strong> acompte de <strong>70 €</strong> à la commande, solde à régler avant expédition de la pièce terminée.</p>
          <p>Les paiements peuvent être effectués par virement bancaire, PayPal, ou tout autre moyen convenu directement avec CLAVE MODS avant validation de la commande.</p>
          <p>En cas de non-paiement du solde dans un délai de 30 jours après notification, CLAVE MODS se réserve le droit d'annuler la commande. L'acompte n'est pas remboursable dans ce cas, conformément à l'article 1590 du Code civil.</p>

          <h2>6. Livraison</h2>
          <ul>
            <li>Expédition sous 48h ouvrées pour les pièces en stock, après réception du paiement.</li>
            <li>Livraison mondiale.</li>
            <li>Frais de port offerts à partir de 150 € d'achat.</li>
            <li>En dessous de 150 € : France métropolitaine 7 €, Union européenne 12 €, international (hors UE) 25 €.</li>
            <li>Un numéro de suivi est communiqué par email dès l'expédition.</li>
          </ul>
          <p>CLAVE MODS ne peut être tenu responsable des retards de livraison causés par le transporteur, des aléas postaux, ou d'événements indépendants de sa volonté (grèves, intempéries, blocages douaniers).</p>
          <p>Les frais de douane et taxes à l'importation éventuellement dus pour les livraisons hors UE sont à la charge de l'acheteur.</p>

          <h2>7. Droit de rétractation</h2>
          <p>Conformément à l'article L.221-18 du Code de la consommation, vous disposez d'un délai de <strong>14 jours calendaires</strong> à compter de la date de réception du bien pour exercer votre droit de rétractation, sans avoir à justifier de motifs ni à payer de pénalités.</p>

          <div className="legal-callout">
            <p><strong>Exception — pièces sur-mesure :</strong> conformément à l'article L.221-28, 3° du Code de la consommation, le droit de rétractation <strong>ne s'applique pas</strong> aux biens confectionnés selon les spécifications du consommateur ou nettement personnalisés. Les montres commandées en configuration sur-mesure (cadran hors catalogue, gravure, aiguilles personnalisées, combinaison spécifique) sont exclues du droit de rétractation.</p>
          </div>

          <h3>Exercice du droit de rétractation (pièces en stock)</h3>
          <p>Pour exercer votre droit de rétractation : contactez <a href="mailto:clavemods@gmail.com">clavemods@gmail.com</a> en indiquant votre numéro de commande et votre décision de vous rétracter. Les frais de retour sont à votre charge. La montre doit être retournée dans son état d'origine, complète et non portée, dans son emballage d'origine.</p>
          <p>Le remboursement est effectué dans les 14 jours suivant la réception du retour, par le même moyen de paiement utilisé lors de la commande.</p>

          <h2>8. Garanties légales</h2>
          <p>Vos achats bénéficient de plein droit des garanties légales suivantes :</p>
          <ul>
            <li><strong>Garantie légale de conformité</strong> (art. L.217-4 et s. du Code de la consommation) : 2 ans à compter de la livraison. En cas de défaut de conformité, vous pouvez demander la réparation ou le remplacement du bien, ou un remboursement sous conditions.</li>
            <li><strong>Garantie légale contre les vices cachés</strong> (art. 1641 et s. du Code civil) : couvre les défauts cachés rendant le bien impropre à l'usage ou diminuant fortement cet usage.</li>
          </ul>

          <h2>9. Garantie commerciale atelier</h2>
          <p>En complément des garanties légales, CLAVE MODS offre une <strong>garantie atelier de 3 ans</strong> à compter de la date d'achat, couvrant les défauts d'assemblage, les problèmes d'étanchéité du boîtier et les défaillances du mouvement imputables à la fabrication.</p>
          <p>Cette garantie commerciale ne couvre pas : l'usure normale (verre, bracelet, fermoir), les dommages causés par un choc, une chute, une immersion excessive au-delà des spécifications, une mauvaise utilisation ou une réparation effectuée par un tiers non autorisé.</p>
          <p>Pour toute demande sous garantie : <a href="mailto:clavemods@gmail.com">clavemods@gmail.com</a>.</p>

          <h2>10. Service après-vente et réclamations</h2>
          <p>Pour toute réclamation, question ou demande SAV, contactez : <a href="mailto:clavemods@gmail.com">clavemods@gmail.com</a>.</p>
          <p>CLAVE MODS s'engage à répondre dans les 48h ouvrées.</p>

          <h2>11. Médiation des litiges</h2>
          <p>En cas de litige non résolu à l'amiable dans un délai raisonnable, vous pouvez recourir gratuitement à un médiateur de la consommation. La Commission européenne met à disposition une plateforme de résolution des litiges en ligne : <a href="https://ec.europa.eu/consumers/odr/" target="_blank" rel="noopener noreferrer">ec.europa.eu/consumers/odr</a>.</p>

          <h2>12. Droit applicable</h2>
          <p>Les présentes CGV sont soumises au droit français. En cas de litige non résolu par la médiation, les tribunaux du ressort du domicile du consommateur seront compétents, conformément aux règles applicables.</p>

        </div>
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
