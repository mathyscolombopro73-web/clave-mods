<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page introuvable — CLAVE MODS</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="assets/clave-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
.notfound {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px var(--gutter);
  gap: 24px;
}
.notfound-code {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--violet-2);
}
.notfound h1 {
  font-family: var(--display);
  font-size: clamp(56px, 12vw, 120px);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 0.9;
  color: var(--fg);
}
.notfound h1 span {
  display: block;
  font-style: italic;
  font-weight: 500;
  color: var(--violet-2);
  font-size: 0.38em;
  margin-top: 12px;
  letter-spacing: -0.01em;
}
.notfound p {
  font-size: 15px;
  color: var(--fg-2);
  line-height: 1.65;
  max-width: 400px;
}
.notfound-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 8px;
}
</style>
</head>
<body>
<div class="notfound">
  <div class="notfound-code">Erreur 404</div>
  <h1>404<span>page introuvable.</span></h1>
  <p>Cette page n'existe pas ou a été déplacée. Retournez à l'accueil pour explorer les collections.</p>
  <div class="notfound-actions">
    <a class="cta" href="index.html">Retour à l'accueil</a>
    <a class="cta-ghost" href="catalogue.html">Voir le catalogue</a>
  </div>
</div>
</body>
</html>
