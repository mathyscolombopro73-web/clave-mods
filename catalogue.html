<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Catalogue — CLAVE MODS · Toutes les Seiko modifiées · Toulouse</title>
<meta name="description" content="Catalogue complet CLAVE MODS. 22 Seiko modifiées — Royal Oak, Nautilus, Date Just. Assemblées à la main à Toulouse. De 110 à 150€." />
<!-- Open Graph / Twitter — ⚠ remplacer clavemods.fr par le domaine réel avant mise en ligne -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="CLAVE MODS" />
<meta property="og:locale" content="fr_FR" />
<meta property="og:title" content="Catalogue — CLAVE MODS · 22 Seiko modifiées · Toulouse" />
<meta property="og:description" content="22 Seiko modifiées — Royal Oak, Nautilus, Date Just. Assemblées à la main à Toulouse. De 110 à 150€." />
<meta property="og:image" content="https://clavemods.fr/assets/collections/nautilus.png" />
<meta property="og:url" content="https://clavemods.fr/catalogue.html" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Catalogue — CLAVE MODS · 22 Seiko modifiées · Toulouse" />
<meta name="twitter:description" content="22 Seiko modifiées — Royal Oak, Nautilus, Date Just. Assemblées à la main à Toulouse. De 110 à 150€." />
<meta name="twitter:image" content="https://clavemods.fr/assets/collections/nautilus.png" />
<link rel="icon" type="image/png" href="assets/clave-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
/* ── Hero catalogue ── */
.cat-hero {
  padding: 100px var(--gutter) 64px;
  max-width: var(--wrap);
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.cat-hero h1 {
  font-family: var(--display);
  font-size: clamp(48px, 6vw, 88px);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 0.92;
  color: var(--fg);
}
.cat-hero h1 em {
  display: block;
  font-style: italic;
  font-weight: 500;
  color: var(--violet-2);
  font-size: 0.52em;
  margin-top: 10px;
}
.cat-hero p { font-size: 16px; color: var(--fg-2); max-width: 480px; line-height: 1.6; }


/* ── Filtres ── */
.filters {
  max-width: var(--wrap);
  margin: 0 auto;
  padding: 0 var(--gutter) 48px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.filter-btn {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .16em;
  text-transform: uppercase;
  padding: 9px 18px;
  border-radius: 999px;
  border: 1px solid var(--hairline);
  background: transparent;
  color: var(--fg-2);
  cursor: pointer;
  transition: all .2s;
}
.filter-btn:hover {
  border-color: var(--violet);
  color: var(--violet-2);
}
.filter-btn.active {
  background: var(--violet);
  border-color: var(--violet);
  color: #0a0a12;
}
.filter-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--fg-mute);
  margin-left: auto;
  letter-spacing: .1em;
}

/* ── Grille ── */
.cat-grid {
  max-width: var(--wrap);
  margin: 0 auto;
  padding: 0 var(--gutter) 100px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
@media (max-width: 1100px) { .cat-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 760px)  { .cat-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } }
@media (max-width: 480px)  { .cat-grid { grid-template-columns: 1fr; } }

/* ── Carte ── */
.prod-img { aspect-ratio: 4/5; }
.prod-img img { width: 100%; height: 100%; object-fit: cover; }
.prod-collection-tag {
  display: inline-block;
  font-family: var(--mono); font-size: 9.5px;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--violet-2);
  margin-bottom: 6px;
}


/* ── État vide ── */
.cat-empty {
  grid-column: 1 / -1;
  padding: 80px 0;
  text-align: center;
  color: var(--fg-mute);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: .14em;
  text-transform: uppercase;
}
.cat-reset {
  background: none;
  border: none;
  color: var(--violet);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: .14em;
  text-transform: uppercase;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
}

/* ── Barre de recherche active ── */
.search-active-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: var(--wrap);
  margin: 0 auto;
  padding: 12px var(--gutter) 0;
}
.search-active-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  flex-shrink: 0;
}
.search-active-input {
  flex: 1;
  min-width: 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--hairline-strong);
  color: var(--fg);
  font-family: var(--mono);
  font-size: 13px;
  padding: 4px 0;
  outline: none;
  letter-spacing: .04em;
}
.search-active-clear {
  flex-shrink: 0;
  background: none;
  border: none;
  color: var(--fg-mute);
  font-size: 14px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 4px;
  transition: color .15s;
}
.search-active-clear:hover { color: var(--fg); }

@media (max-width: 640px) {
  .cat-hero { padding-top: 80px; }
  .filters { gap: 8px; }
  .filter-count { width: 100%; margin-left: 0; margin-top: 4px; }
}
@media (max-width: 480px) {
  .cat-hero { padding-top: 80px; }
  .cat-hero h1 { font-size: clamp(34px, 10vw, 48px); }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ── Icônes ── */
const IArrow = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
const ISearch = (p) => <svg {...p} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;
const IInsta = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>;
const ITt    = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M14 4v9a4 4 0 1 1-4-4"/><path d="M14 4c0 2.5 2 4.5 5 4.5"/></svg>;
const IVinted = (p) => <svg {...p} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1" fill="currentColor" stroke="none"/></svg>;
const IMenu  = (p) => <svg {...p} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M3 12h18M3 6h18M3 18h18"/></svg>;
const IClose = (p) => <svg {...p} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M18 6L6 18M6 6l12 12"/></svg>;

/* ── Données ── */
const ALL_PRODUCTS = window.CLAVE_DATA.products;

const FILTERS = ["Tout", "Royal Oak", "Nautilus", "Date Just"];

/* ── Nav ── */
const Nav = () => {
  const [scrolled, setScrolled] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [query, setQuery] = useState("");
  const inputRef = useRef(null);

  useEffect(() => {
    const f = () => setScrolled(window.scrollY > 4);
    window.addEventListener("scroll", f, { passive: true }); f();
    return () => window.removeEventListener("scroll", f);
  }, []);

  useEffect(() => {
    if (!searchOpen) return;
    const onKey  = (e) => { if (e.key === "Escape") { setSearchOpen(false); setQuery(""); } };
    const onDown = (e) => { if (!e.target.closest(".nav")) { setSearchOpen(false); setQuery(""); } };
    document.addEventListener("keydown", onKey);
    document.addEventListener("mousedown", onDown);
    return () => { document.removeEventListener("keydown", onKey); document.removeEventListener("mousedown", onDown); };
  }, [searchOpen]);

  useEffect(() => { if (searchOpen && inputRef.current) inputRef.current.focus(); }, [searchOpen]);

  const submit = () => {
    if (!query.trim()) return;
    window.location.href = `catalogue.html?q=${encodeURIComponent(query.trim())}`;
  };

  return (
    <nav className="nav" style={{ borderBottomColor: scrolled ? "var(--hairline-strong)" : "var(--hairline)" }}>
      <div className="nav-inner">
        <a className="nav-logo" href="index.html">
          <img src="assets/clave-logo.png" alt="" />
          <span><span className="mark">CLAVE</span> <span className="mods">MODS</span></span>
        </a>
        {searchOpen ? (
          <div className="nav-search">
            <input ref={inputRef} type="text" className="nav-search-input" value={query}
              onChange={(e) => setQuery(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && submit()}
              placeholder="Rechercher une montre…" />
            <button className="nav-search-submit" onClick={submit} aria-label="Rechercher"><IArrow /></button>
          </div>
        ) : (
          <div className="nav-links">
            <a href="index.html">Accueil</a>
            <a className="active" href="catalogue.html">Catalogue</a>
            <a href="index.html#histoire">Notre Histoire</a>
            <a href="index.html#contact">Contact</a>
          </div>
        )}
        <div className="nav-utils">
          <button className="ic-btn" aria-label={searchOpen ? "Fermer" : "Recherche"} onClick={() => { setSearchOpen(s => !s); if (searchOpen) setQuery(""); }}><ISearch /></button>
          <button className="ic-btn ham-btn" aria-label={menuOpen ? "Fermer le menu" : "Menu"} onClick={() => setMenuOpen(o => !o)}>{menuOpen ? <IClose /> : <IMenu />}</button>
        </div>
      </div>
      {menuOpen && (
        <div className="nav-mobile">
          <a href="index.html">Accueil</a>
          <a className="active" href="catalogue.html">Catalogue</a>
          <a href="index.html#histoire">Notre Histoire</a>
          <a href="index.html#contact">Contact</a>
        </div>
      )}
    </nav>
  );
};

/* ── Badge ── */
const Badge = ({ label }) => {
  if (!label) return null;
  if (label === "Best Seller") return <span className="badge-bs">{label}</span>;
  if (label === "Limitée")    return <span className="badge-limitee">★ {label}</span>;
  if (label === "Nouveau")    return <span className="badge-new">{label}</span>;
  return null;
};

/* ── Carte produit ── */
const ProductCard = ({ p }) => (
  <article className="prod-card" onClick={() => window.location.href = `product.html?ref=${p.ref}`} style={{ cursor:"pointer" }}>
    <div className="prod-img">
      <img src={p.photo} alt={`${p.name} · ${p.collection} · Seiko modifiée CLAVE MODS`} loading="lazy" style={{ objectPosition: p.objPos }} />
      {p.badge && <div className="ribbon"><Badge label={p.badge} /></div>}
      <span className="ref">{p.ref}</span>
    </div>
    <div className="prod-body">
      <div className="prod-name-row">
        <div>
          <div className="prod-collection-tag" onClick={(e) => e.stopPropagation()}>
            <a href={p.collectionHref} style={{ color:"inherit", textDecoration:"none" }}>{p.collection}</a>
          </div>
          <div className="prod-name">{p.name}</div>
        </div>
        <span className="prod-stock low">Sur commande</span>
      </div>
      <p className="prod-desc">{p.desc}</p>
      <div className="prod-price-row">
        <div className="prod-price"><span className="vlt">{p.price}€</span></div>
        <button className="prod-btn" onClick={(e) => e.stopPropagation()}>Commander</button>
      </div>
    </div>
  </article>
);

/* ── Footer ── */
const Footer = () => (
  <footer>
    <div className="footer-inner">
      <div className="footer-brand">
        <div className="logo">
          <img src="assets/clave-logo.png" alt="" />
          <span><span>CLAVE</span> <span className="mods">MODS</span></span>
        </div>
        <p>Maison française de Seiko modifiées artisanalement. Chaque pièce est assemblée, réglée et contrôlée à la main — l'atelier CLAVE, à Toulouse.</p>
      </div>
      <div className="footer-col"><h5>Collections</h5><ul>
        <li><a href="royal-oak.html">Royal Oak</a></li>
        <li><a href="nautilus.html">Nautilus</a></li>
        <li><a href="date-just.html">Date Just</a></li>
        <li><a href="catalogue.html" style={{ color:"var(--violet-2)" }}>Voir le catalogue</a></li>
      </ul></div>
      <div className="footer-col"><h5>Atelier</h5><ul>
        <li><a href="index.html#histoire">Notre histoire</a></li>
      </ul>
      <h5 style={{ marginTop:"22px" }}>Légal</h5>
      <ul>
        <li><a href="mentions-legales.html">Mentions légales</a></li>
        <li><a href="cgv.html">CGV</a></li>
        <li><a href="confidentialite.html">Confidentialité</a></li>
      </ul></div>
      <div className="footer-col"><h5>Support</h5><ul>
        <li><a href="index.html#contact">Nous écrire</a></li>
      </ul>
      <h5 style={{ marginTop:"22px" }}>Retrouvez-moi</h5>
      <ul className="footer-social-links">
        <li><a href="https://www.instagram.com/clave_mods/" target="_blank" rel="noopener noreferrer"><span className="soc-icon"><IInsta /></span>Instagram</a></li>
        <li><a href="https://www.tiktok.com/@clavemods" target="_blank" rel="noopener noreferrer"><span className="soc-icon"><ITt /></span>TikTok</a></li>
        <li><a href="https://www.vinted.fr/member/3155836117" target="_blank" rel="noopener noreferrer"><span className="soc-icon"><IVinted /></span>Vinted</a></li>
      </ul></div>
      
    </div>
    <div className="footer-bottom">
      <span>© CLAVE MODS · 2017 — 2026 · Toulouse</span>
      <div className="footer-legal">
        <a href="mentions-legales.html">Mentions légales</a>
        <a href="cgv.html">CGV</a>
        <a href="confidentialite.html">Confidentialité</a>
      </div>
      <div className="footer-social">
        <a href="https://www.instagram.com/clave_mods/" aria-label="Instagram" target="_blank" rel="noopener noreferrer"><IInsta /></a>
        <a href="https://www.tiktok.com/@clavemods" aria-label="TikTok" target="_blank" rel="noopener noreferrer"><ITt /></a>
        <a href="https://www.vinted.fr/member/3155836117" aria-label="Vinted" target="_blank" rel="noopener noreferrer"><IVinted /></a>
      </div>
    </div>
  </footer>
);

/* ── Page ── */
function Page() {
  const [active, setActive] = useState("Tout");
  const [searchQuery, setSearchQuery] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    return params.get("q") || "";
  });

  const norm = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

  const filtered = ALL_PRODUCTS.filter((p) => {
    const colMatch = active === "Tout" || p.collection === active;
    if (!searchQuery.trim()) return colMatch;
    const q = norm(searchQuery.trim());
    const textMatch = norm(p.name).includes(q) || norm(p.desc).includes(q) || norm(p.collection).includes(q) || norm(p.ref).includes(q);
    return colMatch && textMatch;
  });

  const clearSearch = () => {
    setSearchQuery("");
    window.history.replaceState({}, "", "catalogue.html");
  };

  return (
    <>
      <div className="ship-banner">
        <span><span className="dot" /> Livraison mondiale offerte dès 150€</span>
        <span className="sep ship-extra">✦</span>
        <span className="ship-extra">Pièces numérotées, assemblées à Toulouse</span>
        <span className="sep ship-extra">✦</span>
        <span className="ship-extra">Garantie 3 ans atelier</span>
      </div>

      <Nav />

      <main>
      <nav className="breadcrumb" aria-label="Fil d'Ariane">
        <a href="index.html">Accueil</a>
        <span className="sep">›</span>
        <span style={{ color:"var(--fg-2)" }}>Catalogue</span>
      </nav>

      <div className="cat-hero">
        <div className="eyebrow">Catalogue complet · CLAVE MODS</div>
        <h1>
          {ALL_PRODUCTS.length} pièces
          <em>Toutes les collections.</em>
        </h1>
        <p>Royal Oak, Nautilus, Date Just — chaque montre est assemblée à la main dans l'atelier toulousain CLAVE. Aucune pièce ne ressemble à une autre.</p>
      </div>

      {searchQuery && (
        <div className="search-active-bar">
          <span className="search-active-label">Résultats pour :</span>
          <input
            className="search-active-input"
            value={searchQuery}
            onChange={(e) => setSearchQuery(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Escape") clearSearch(); }}
          />
          <button className="search-active-clear" onClick={clearSearch} aria-label="Effacer la recherche">✕</button>
        </div>
      )}

      <div className="filters">
        {FILTERS.map((f) => (
          <button
            key={f}
            className={`filter-btn ${active === f ? "active" : ""}`}
            onClick={() => setActive(f)}
          >
            {f}
            {f !== "Tout" && (
              <span style={{ marginLeft:6, opacity:.6 }}>
                · {ALL_PRODUCTS.filter((p) => p.collection === f).length}
              </span>
            )}
          </button>
        ))}
        <span className="filter-count">{filtered.length} référence{filtered.length > 1 ? "s" : ""}</span>
      </div>

      <div className="cat-grid">
        {filtered.length === 0
          ? <div className="cat-empty">
              {searchQuery
                ? <>Aucune montre trouvée pour «&nbsp;{searchQuery}&nbsp;». <button className="cat-reset" onClick={clearSearch}>Réinitialiser</button></>
                : "Aucune pièce dans cette collection."
              }
            </div>
          : filtered.map((p) => <ProductCard key={p.ref} p={p} />)
        }
      </div>
      </main>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
